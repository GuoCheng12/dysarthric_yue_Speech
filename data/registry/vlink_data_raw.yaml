  prompt_disjoint_v1_train_split: /data/qwen3-asr/inference/outputs/prompt_disjoint_v1/prompt_disjoint_train.csv
  prompt_disjoint_v1_dev_split: /data/qwen3-asr/inference/outputs/prompt_disjoint_v1/prompt_disjoint_dev.csv
  prompt_disjoint_v1_test_split: /data/qwen3-asr/inference/outputs/prompt_disjoint_v1/prompt_disjoint_test.csv
